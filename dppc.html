<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Company Page</title>

<link rel="stylesheet" href="company.css">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<header>
<img src="logo-dp.png" alt="Company Logo" class="logo">
</header>

<div class="main-container">

<!-- Navigation -->
<div class="section-nav">
<button onclick="scrollToSection('about')">About</button>
<button onclick="scrollToSection('services')">Services</button>
<button onclick="scrollToSection('mission')">Mission</button>
<button onclick="scrollToSection('vision')">Vision</button>
<button onclick="scrollToSection('contact')">Contact</button>
</div>

<!-- Carousel -->
<section class="hero">

<div id="carouselExampleIndicators" class="carousel slide company-carousel">

<div class="carousel-indicators">
<button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active"></button>
<button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1"></button>
<button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2"></button>
<button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="3"></button>
</div>

<div class="carousel-inner">

        <div class="carousel-item active">
        <img src="front-dynamic.jpg" class="d-block w-100">
        </div>

        <div class="carousel-item">
        <img src="prod.jpg" class="d-block w-100">
        </div>

        <div class="carousel-item">
        <img src="prod2.jpg" class="d-block w-100">
        </div>

        <div class="carousel-item">
        <img src="dppc-front.jpg" class="d-block w-100">
        </div>

</div>

<button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="prev">
<span class="carousel-control-prev-icon"></span>
</button>

<button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="next">
<span class="carousel-control-next-icon"></span>
</button>

</div>

</section>

<!-- Sections -->

<section id="about" class="section">
<h2>About</h2>
<p>Dynamic Precision Philippines Corp is part of the Dynamic Precision Group founded in Norway.</p>
</section>

<section id="services" class="section">
<h2>Services</h2>
<p>Electronics Manufacturing, SMT Assembly, Quality Control.</p>
</section>

<section id="mission" class="section">
<h2>Mission</h2>
<p>Your mission text here.</p>
</section>

<section id="vision" class="section">
<h2>Vision</h2>
<p>Your vision text here.</p>
</section>

<section id="contact" class="section">
<h2>Contact</h2>
<p>Angeles City, Pampanga</p>
</section>

</div>

<script>
function scrollToSection(id){
document.getElementById(id).scrollIntoView({
behavior:'smooth'
});
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
